name: Update Data

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '17 18 * * *'
  workflow_dispatch:
    inputs:
      discovery_mode:
        description: 'Use YouTube search.list to expand the searchable channel pool'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      candidate_resolve_limit:
        description: 'How many youtubers.me candidates to resolve in this manual run'
        required: false
        default: '25'

permissions:
  contents: write

concurrency:
  group: update-youtube-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TOP_CHANNEL_LIMIT: 100
          RANKING_POOL_SIZE: 500
          CANDIDATE_LIMIT: 1000
          CANDIDATE_RESOLVE_LIMIT: ${{ github.event.inputs.candidate_resolve_limit || '25' }}
          VERIFY_OFFICIAL_TW: true
          LATEST_VIDEO_CHANNEL_LIMIT: 20
          LATEST_VIDEO_COUNT: 3
          DISCOVERY_MODE: ${{ github.event.inputs.discovery_mode || (github.event.schedule == '17 18 * * *' && 'true' || 'false') }}
        run: python scripts/fetch_data.py
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          git add data.json data/ -f
          git diff --staged --quiet || git commit -m "Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
